<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Amazone</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #131921;
        color: #ffffff;
      }
      .card {
        max-width: 420px;
        padding: 28px 24px;
        border-radius: 12px;
        background: #1f2a38;
        border: 1px solid #2f3d50;
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 16px;
        color: #d1d5db;
        line-height: 1.5;
      }
      a {
        color: #ff9900;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        Internet connection is unavailable right now. Please reconnect and try again.
      </p>
      <a href="/">Try Again</a>
    </main>
  </body>
</html>
